name: Deploy ZoneCheck Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/zonecheck/**'
      - 'supabase/config.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ZoneCheck Edge Function
        run: supabase functions deploy zonecheck --no-verify-jwt --project-ref htnufvbzsfdfadnnfnje
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}