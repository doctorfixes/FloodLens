name: Deploy ZoneCheck Edge Function

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/zonecheck/**'
      - 'supabase/config.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Supabase deploy configuration
        id: supabase-config
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::notice::Skipping ZoneCheck Edge Function deploy because SUPABASE_ACCESS_TOKEN is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: supabase/setup-cli@v1
        if: steps.supabase-config.outputs.configured == 'true'
        with:
          version: latest

      - name: Deploy ZoneCheck Edge Function
        if: steps.supabase-config.outputs.configured == 'true'
        run: supabase functions deploy zonecheck --no-verify-jwt --project-ref htnufvbzsfdfadnnfnje