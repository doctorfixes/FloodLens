name: Validate Migrations

on:
  pull_request:
    paths:
      - "supabase/migrations/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Check Supabase migration validation configuration
        id: supabase-config
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::notice::Skipping migration dry-run because SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_ID is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: supabase/setup-cli@v1
        if: steps.supabase-config.outputs.configured == 'true'
        with:
          version: latest

      - name: Link Supabase project
        if: steps.supabase-config.outputs.configured == 'true'
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Validate migrations
        if: steps.supabase-config.outputs.configured == 'true'
        run: supabase db push --dry-run
