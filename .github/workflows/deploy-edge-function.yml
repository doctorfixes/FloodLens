name: Deploy Edge Function

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Check Supabase deploy configuration
        id: supabase-config
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::notice::Skipping Edge Function deploy because SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_ID is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: supabase/setup-cli@v1
        if: steps.supabase-config.outputs.configured == 'true'
        with:
          version: latest

      - name: Deploy determine-zone Edge Function
        if: steps.supabase-config.outputs.configured == 'true'
        run: supabase functions deploy determine-zone --project-ref "$SUPABASE_PROJECT_ID"
