name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Check deploy configuration
        id: config
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::notice::Skipping Edge Function deploy — SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_ID not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - uses: supabase/setup-cli@v1
        if: steps.config.outputs.configured == 'true'
        with:
          version: latest

      - name: Deploy zonecheck
        if: steps.config.outputs.configured == 'true'
        run: supabase functions deploy zonecheck --no-verify-jwt --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy determine-zone
        if: steps.config.outputs.configured == 'true'
        run: supabase functions deploy determine-zone --project-ref "$SUPABASE_PROJECT_ID"
