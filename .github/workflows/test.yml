name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deno-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check edge functions
        run: |
          deno check \
            supabase/functions/zonecheck/index.ts \
            supabase/functions/determine-zone/index.ts

      - name: Run tests
        run: deno test --allow-read --allow-net=deno.land,esm.sh tests
