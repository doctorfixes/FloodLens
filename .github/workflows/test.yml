name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deno-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check edge functions
        run: |
          deno check \
            supabase/functions/zonecheck/index.ts \
            supabase/functions/determine-zone/index.ts

      - name: Run tests
        run: deno test --allow-read --allow-net=deno.land,esm.sh tests

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest requests

      - name: Run Python pipeline tests
        run: python -m pytest tests/python -q

  pgtap-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL, PostGIS and pgTAP
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            postgresql-16-postgis-3 postgresql-16-pgtap pgtap

      - name: Start PostgreSQL
        run: sudo pg_ctlcluster 16 main start

      - name: Create test database and load schema
        run: |
          sudo -u postgres psql -c "CREATE DATABASE floodlens_test;"
          sudo -u postgres psql -d floodlens_test \
            -c "CREATE EXTENSION IF NOT EXISTS postgis;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgtap;"
          sudo -u postgres psql -d floodlens_test -v ON_ERROR_STOP=1 \
            -f supabase/migrations/00002_create_flood_zones.sql \
            -f supabase/migrations/00003_fn_get_flood_risk.sql

      - name: Run pgTAP tests
        run: sudo -u postgres pg_prove -d floodlens_test tests/sql/*_test.sql

      - name: Verify multi-state ingestion (non-Denver, end-to-end)
        run: python3 tests/integration/verify_multistate_ingest.py --database floodlens_test
